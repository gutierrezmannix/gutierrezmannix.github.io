  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

 #743620;\n  --barro-800: #562A1B;\n  --barro-900: #3A1E14;\n\n  /* ---- Toronja (accent — citrus amber / grapefruit grove) ---- */\n  --toronja-50:  #FDF3E2;\n  --toronja-100: #FAE2BC;\n  --toronja-200: #F5C778;\n  --toronja-300: #EFAB3D;\n  --toronja-400: #E5912A;\n  --toronja-500: #CE7714;\n  --toronja-600: #A65D0F;\n  --toronja-700: #80470E;\n  --toronja-800: #5C340D;\n  --toronja-900: #3D230A;\n\n  /* ---- Resaca (water — oxbow lakes & the Rio) ---- */\n  --resaca-50:  #E8F2F4;\n  --resaca-100: #C8E0E6;\n  --resaca-200: #95C3CE;\n  --resaca-300: #5DA0B1;\n  --resaca-400: #357F93;\n  --resaca-500: #226578;\n  --resaca-600: #1A5061;\n  --resaca-700: #163F4C;\n  --resaca-800: #122F39;\n  --resaca-900: #0D2128;\n\n  /* ---- Arena (neutral — warm sand & shade) ---- */\n  --arena-0:   #FFFFFF;\n  --arena-50:  #FAF7F1;\n  --arena-100: #F2ECE1;\n  --arena-200: #E5DBCB;\n  --arena-300: #D2C5AF;\n  --arena-400: #AB9F8A;\n  --arena-500: #7E7563;\n  --arena-600: #5D5648;\n  --arena-700: #433D31;\n  --arena-800: #2B271E;\n  --arena-900: #1A1711;\n\n  /* ---- Raw semantic hues ---- */\n  --green:  var(--verde-500);\n  --amber:  var(--toronja-400);\n  --clay:   var(--barro-500);\n  --blue:   var(--resaca-400);\n  --red:    #C0432B;\n  --red-50: #FBEAE6;\n  --red-700:#7E2A1B;\n\n  /* ============================================================\n     SEMANTIC ALIASES — reference these in components, not raw hues\n     ============================================================ */\n\n  /* Surfaces */\n  --surface-page:     var(--arena-50);\n  --surface-card:     var(--arena-0);\n  --surface-sunken:   var(--arena-100);\n  --surface-raised:   var(--arena-0);\n  --surface-inverse:  var(--verde-800);\n  --surface-overlay:  rgba(26, 23, 17, 0.55);\n\n  /* Text */\n  --text-strong:   var(--arena-900);\n  --text-body:     var(--arena-800);\n  --text-muted:    var(--arena-500);\n  --text-subtle:   var(--arena-400);\n  --text-inverse:  var(--arena-50);\n  --text-on-brand: #FFFFFF;\n  --text-link:     var(--verde-600);\n\n  /* Brand */\n  --brand:         var(--verde-600);\n  --brand-hover:   var(--verde-700);\n  --brand-active:  var(--verde-800);\n  --brand-soft:    var(--verde-50);\n  --brand-soft-border: var(--verde-200);\n\n  --accent:        var(--toronja-400);\n  --accent-hover:  var(--toronja-500);\n  --accent-soft:   var(--toronja-50);\n\n  /* Borders & lines */\n  --border-soft:   var(--arena-200);\n  --border:        var(--arena-300);\n  --border-strong: var(--arena-400);\n  --border-brand:  var(--verde-300);\n\n  /* Focus */\n  --focus-ring:    var(--toronja-300);\n\n  /* Status */\n  --success:        var(--verde-500);\n  --success-soft:   var(--verde-50);\n  --warning:        var(--toronja-400);\n  --warning-soft:   var(--toronja-50);\n  --danger:         var(--red);\n  --danger-soft:    var(--red-50);\n  --info:           var(--resaca-400);\n  --info-soft:      var(--resaca-50);\n\n  /* ---- Trail difficulty (domain semantic) ---- */\n  --diff-easy:       var(--verde-500);\n  --diff-easy-soft:  var(--verde-50);\n  --diff-moderate:   var(--toronja-400);\n  --diff-moderate-soft: var(--toronja-50);\n  --diff-hard:       var(--barro-500);\n  --diff-hard-soft:  var(--barro-50);\n  --diff-expert:     var(--arena-900);\n  --diff-expert-soft:var(--arena-200);\n\n  /* ---- Map / terrain fills ---- */\n  --terrain-water:   var(--resaca-200);\n  --terrain-land:    var(--arena-100);\n  --terrain-park:    var(--verde-100);\n  --terrain-trail:   var(--barro-400);\n  --terrain-contour: var(--arena-300);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   SENDERO — TYPOGRAPHY TOKENS\n   ============================================================ */\n\n:root {\n  /* ---- Families ---- */\n  --font-display: 'Bricolage Grotesque', 'Hanken Grotesk', system-ui, sans-serif;\n  --font-sans:    'Hanken Grotesk', system-ui, -apple-system, sans-serif;\n  --font-mono:    'Space Mono', ui-monospace, 'SFMono-Regular', monospace;\n\n  /* ---- Weights ---- */\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n  --weight-extra:    800;\n\n  /* ---- Type scale (rem, 16px base) ---- */\n  --text-2xs:  0.6875rem;  /* 11px — map labels, fine print */\n  --text-xs:   0.75rem;    /* 12px — captions, eyebrows */\n  --text-sm:   0.875rem;   /* 14px — secondary UI */\n  --text-base: 1rem;       /* 16px — body */\n  --text-lg:   1.125rem;   /* 18px — lead body */\n  --text-xl:   1.375rem;   /* 22px — card titles */\n  --text-2xl:  1.75rem;    /* 28px — section heads */\n  --text-3xl:  2.25rem;    /* 36px — page titles */\n  --text-4xl:  3rem;       /* 48px — hero */\n  --text-5xl:  4rem;       /* 64px — display */\n\n  /* ---- Line heights ---- */\n  --leading-tight:   1.1;\n  --leading-snug:    1.25;\n  --leading-normal:  1.5;\n  --leading-relaxed: 1.65;\n\n  /* ---- Letter spacing ---- */\n  --tracking-tight:  -0.02em;\n  --tracking-snug:   -0.01em;\n  --tracking-normal: 0;\n  --tracking-wide:   0.04em;\n  --tracking-eyebrow:0.14em;  /* uppercase eyebrows / overlines */\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   SENDERO — SPACING, RADII, SIZING\n   8px-based rhythm with a couple of half-steps for dense UI.\n   ============================================================ */\n\n:root {\n  /* ---- Spacing scale ---- */\n  --space-0:   0;\n  --space-1:   0.25rem;  /* 4 */\n  --space-2:   0.5rem;   /* 8 */\n  --space-3:   0.75rem;  /* 12 */\n  --space-4:   1rem;     /* 16 */\n  --space-5:   1.5rem;   /* 24 */\n  --space-6:   2rem;     /* 32 */\n  --space-7:   2.5rem;   /* 40 */\n  --space-8:   3rem;     /* 48 */\n  --space-9:   4rem;     /* 64 */\n  --space-10:  6rem;     /* 96 */\n\n  /* ---- Corner radii (soft, field-guide rounded) ---- */\n  --radius-xs:   4px;\n  --radius-sm:   8px;\n  --radius-md:   12px;\n  --radius-lg:   16px;\n  --radius-xl:   24px;\n  --radius-2xl:  32px;\n  --radius-pill: 999px;\n\n  /* ---- Border widths ---- */\n  --border-thin:  1px;\n  --border-base:  1.5px;\n  --border-thick: 2px;\n\n  /* ---- Layout ---- */\n  --container-sm:  640px;\n  --container-md:  860px;\n  --container-lg:  1100px;\n  --app-width:     420px;   /* mobile app frame */\n  --tap-min:       44px;    /* min touch target */\n\n  /* ---- Motion ---- */\n  --ease-out:   cubic-bezier(0.22, 0.61, 0.36, 1);   /* @kind other */\n  --ease-in-out:cubic-bezier(0.65, 0, 0.35, 1);      /* @kind other */\n  --ease-spring:cubic-bezier(0.34, 1.56, 0.64, 1);   /* @kind other */\n  --dur-fast:   120ms;                                /* @kind other */\n  --dur-base:   200ms;                                /* @kind other */\n  --dur-slow:   320ms;                                /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   SENDERO — ELEVATION & SHADOWS\n   Warm-tinted shadows (sand/earth based, never pure black) so\n   raised surfaces feel sunlit rather than clinical.\n   ============================================================ */\n\n:root {\n  --shadow-xs:  0 1px 2px rgba(43, 39, 30, 0.06);\n  --shadow-sm:  0 1px 3px rgba(43, 39, 30, 0.08), 0 1px 2px rgba(43, 39, 30, 0.06);\n  --shadow-md:  0 4px 10px -2px rgba(43, 39, 30, 0.10), 0 2px 4px -2px rgba(43, 39, 30, 0.06);\n  --shadow-lg:  0 12px 24px -6px rgba(43, 39, 30, 0.14), 0 4px 8px -4px rgba(43, 39, 30, 0.08);\n  --shadow-xl:  0 24px 48px -12px rgba(43, 39, 30, 0.20), 0 8px 16px -8px rgba(43, 39, 30, 0.10);\n\n  /* Inset for sunken fields / map wells */\n  --shadow-inset: inset 0 1px 2px rgba(43, 39, 30, 0.10);\n\n  /* Focus ring as a layered shadow */\n  --ring: 0 0 0 3px var(--focus-ring);\n\n  /* Card lift on hover */\n  --shadow-card:       var(--shadow-sm);\n  --shadow-card-hover: var(--shadow-md);\n\n  /* Floating map controls / FAB */\n  --shadow-float: 0 6px 16px -4px rgba(13, 43, 32, 0.24), 0 2px 6px -2px rgba(13, 43, 32, 0.16);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   SENDERO — BASE / RESET\n   Minimal, opinionated defaults so specimens & kits inherit the\n   brand without per-file boilerplate.\n   ============================================================ */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-sans);\n  font-size: var(--text-base);\n  line-height: var(--leading-normal);\n  color: var(--text-body);\n  background: var(--surface-page);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4, h5 {\n  font-family: var(--font-display);\n  font-weight: var(--weight-bold);\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-tight);\n  color: var(--text-strong);\n  margin: 0;\n  text-wrap: balance;\n}\n\np { text-wrap: pretty; }\n\na { color: var(--text-link); text-decoration: none; }\na:hover { text-decoration: underline; }\n\ncode, kbd, samp { font-family: var(--font-mono); }\n\n/* Shared helpers used across specimens */\n.eyebrow {\n  font-family: var(--font-sans);\n  font-size: var(--text-xs);\n  font-weight: var(--weight-bold);\n  letter-spacing: var(--tracking-eyebrow);\n  text-transform: uppercase;\n  color: var(--text-muted);\n}\n\n.mono-stat {\n  font-family: var(--font-mono);\n  font-variant-numeric: tabular-nums;\n  letter-spacing: var(--tracking-snug);\n}\n\n::selection { background: var(--toronja-200); color: var(--arena-900); }\n<\u002Fstyle>\n  <style>/* ============================================================\n   SENDERO DESIGN SYSTEM — global entry point\n   Consumers link this single file. Imports only — no rules here.\n   ============================================================ */\n\n/* ============================================================\n   SENDERO — FONTS\n   Loaded from Google Fonts CDN (no local binaries shipped).\n   - Bricolage Gr rmat('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"1dcf424d-d35a-4ef3-abe7-605ac1855965\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"2d35bb73-2f89-436d-a735-a3281bc4fd11\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"aabd4da1-9fa8-426f-8bb0-1651112e755f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"8ceb9f18-8506-423c-ac59-02254c79b8a0\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"b0d6cbb5-e4be-4a51-b99f-c0cc34bb5c3d\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"72a5a1e5-0f5b-4619-bc49-0d921a137777\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ============================================================\n   SENDERO — COLOR TOKENS\n   Palette rooted in the Rio Grande Valley: mesquite canopy green,\n   adobe/clay earth, citrus amber, resaca water blue, warm sand.\n   ============================================================ */\n\n:root {\n  /* ---- Verde (primary — mesquite canopy) ---- */\n  --verde-50:  #EDF5F0;\n  --verde-100: #D6E8DD;\n  --verde-200: #AFD2BF;\n  --verde-300: #80B79B;\n  --verde-400: #549A78;\n  --verde-500: #2E7D58;\n  --verde-600: #1F6447;\n  --verde-700: #194F39;\n  --verde-800: #143E2D;\n  --verde-900: #0E2B20;\n\n  /* ---- Barro (secondary — adobe clay / RGV soil) ---- */\n  --barro-50:  #FAEEE7;\n  --barro-100: #F3D9C9;\n  --barro-200: #E6B59A;\n  --barro-300: #D68F6A;\n  --barro-400: #C56F43;\n  --barro-500: #B0572F;\n  --barro-600: #934425;\n  --barro-700: #743620;\n  --barro-800: #562A1B;\n  --barro-900: #3A1E14;\n\n  /* ---- Toronja (accent — citrus amber / grapefruit grove) ---- */\n  --toronja-50:  #FDF3E2;\n  --toronja-100: #FAE2BC;\n  --toronja-200: #F5C778;\n  --toronja-300: #EFAB3D;\n  --toronja-400: #E5912A;\n  --toronja-500: #CE7714;\n  --toronja-600: #A65D0F;\n  --toronja-700: #80470E;\n  --toronja-800: #5C340D;\n  --toronja-900: #3D230A;\n\n  /* ---- Resaca (water — oxbow lakes & the Rio) ---- */\n  --resaca-50:  #E8F2F4;\n  --resaca-100: #C8E0E6;\n  --resaca-200: #95C3CE;\n  --resaca-300: #5DA0B1;\n  --resaca-400: #357F93;\n  --resaca-500: #226578;\n  --resaca-600: #1A5061;\n  --resaca-700: #163F4C;\n  --resaca-800: #122F39;\n  --resaca-900: #0D2128;\n\n  /* ---- Arena (neutral — warm sand & shade) ---- */\n  --arena-0:   #FFFFFF;\n  --arena-50:  #FAF7F1;\n  --arena-100: #F2ECE1;\n  --arena-200: #E5DBCB;\n  --arena-300: #D2C5AF;\n  --arena-400: #AB9F8A;\n  --arena-500: #7E7563;\n  --arena-600: #5D5648;\n  --arena-700: #433D31;\n  --arena-800: #2B271E;\n  --arena-900: #1A1711;\n\n  /* ---- Raw semantic hues ---- */\n  --green:  var(--verde-500);\n  --amber:  var(--toronja-400);\n  --clay:   var(--barro-500);\n  --blue:   var(--resaca-400);\n  --red:    #C0432B;\n  --red-50: #FBEAE6;\n  --red-700:#7E2A1B;\n\n  /* ============================================================\n     SEMANTIC ALIASES — reference these in components, not raw hues\n     ============================================================ */\n\n  /* Surfaces */\n  --surface-page:     var(--arena-50);\n  --surface-card:     var(--arena-0);\n  --surface-sunken:   var(--arena-100);\n  --surface-raised:   var(--arena-0);\n  --surface-inverse:  var(--verde-800);\n  --surface-overlay:  rgba(26, 23, 17, 0.55);\n\n  /* Text */\n  --text-strong:   var(--arena-900);\n  --text-body:     var(--arena-800);\n  --text-muted:    var(--arena-500);\n  --text-subtle:   var(--arena-400);\n  --text-inverse:  var(--arena-50);\n  --text-on-brand: #FFFFFF;\n  --text-link:     var(--verde-600);\n\n  /* Brand */\n  --brand:         var(--verde-600);\n  --brand-hover:   var(--verde-700);\n  --brand-active:  var(--verde-800);\n  --brand-soft:    var(--verde-50);\n  --brand-soft-border: var(--verde-200);\n\n  --accent:        var(--toronja-400);\n  --accent-hover:  var(--toronja-500);\n  --accent-soft:   var(--toronja-50);\n\n  /* Borders & lines */\n  --border-soft:   var(--arena-200);\n  --border:        var(--arena-300);\n  --border-strong: var(--arena-400);\n  --border-brand:  var(--verde-300);\n\n  /* Focus */\n  --focus-ring:    var(--toronja-300);\n\n  /* Status */\n  --success:        var(--verde-500);\n  --success-soft:   var(--verde-50);\n  --warning:        var(--toronja-400);\n  --warning-soft:   var(--toronja-50);\n  --danger:         var(--red);\n  --danger-soft:    var(--red-50);\n  --info:           var(--resaca-400);\n  --info-soft:      var(--resaca-50);\n\n  /* ---- Trail difficulty (domain semantic) ---- */\n  --diff-easy:       var(--verde-500);\n  --diff-easy-soft:  var(--verde-50);\n  --diff-moderate:   var(--toronja-400);\n  --diff-moderate-soft: var(--toronja-50);\n  --diff-hard:       var(--barro-500);\n  --diff-hard-soft:  var(--barro-50);\n  --diff-expert:     var(--arena-900);\n  --diff-expert-soft:var(--arena-200);\n\n  /* ---- Map / terrain fills ---- */\n  --terrain-water:   var(--resaca-200);\n  --terrain-land:    var(--arena-100);\n  --terrain-park:    var(--verde-100);\n  --terrain-trail:   var(--barro-400);\n  --terrain-contour: var(--arena-300);\n}\n\n/* ============================================================\n   SENDERO — TYPOGRAPHY TOKENS\n   ============================================================ */\n\n:root {\n  /* ---- Families ---- */\n  --font-display: 'Bricolage Grotesque', 'Hanken Grotesk', system-ui, sans-serif;\n  --font-sans:    'Hanken Grotesk', system-ui, -apple-system, sans-serif;\n  --font-mono:    'Space Mono', ui-monospace, 'SFMono-Regular', monospace;\n\n  /* ---- Weights ---- */\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n  --weight-extra:    800;\n\n  /* ---- Type scale (rem, 16px base) ---- */\n  --text-2xs:  0.6875rem;  /* 11px — map labels, fine print */\n  --text-xs:   0.75rem;    /* 12px — captions, eyebrows */\n  --text-sm:   0.875rem;   /* 14px — secondary UI */\n  --text-base: 1rem;       /* 16px — body */\n  --text-lg:   1.125rem;   /* 18px — lead body */\n  --text-xl:   1.375rem;   /* 22px — card titles */\n  --text-2xl:  1.75rem;    /* 28px — section heads */\n  --text-3xl:  2.25rem;    /* 36px — page titles */\n  --text-4xl:  3rem;       /* 48px — hero */\n  --text-5xl:  4rem;       /* 64px — display */\n\n  /* ---- Line heights ---- */\n  --leading-tight:   1.1;\n  --leading-snug:    1.25;\n  --leading-normal:  1.5;\n  --leading-relaxed: 1.65;\n\n  /* ---- Letter spacing ---- */\n  --tracking-tight:  -0.02em;\n  --tracking-snug:   -0.01em;\n  --tracking-normal: 0;\n  --tracking-wide:   0.04em;\n  --tracking-eyebrow:0.14em;  /* uppercase eyebrows / overlines */\n}\n\n/* ============================================================\n   SENDERO — SPACING, RADII, SIZING\n   8px-based rhythm with a couple of half-steps for dense UI.\n   ============================================================ */\n\n:root {\n  /* ---- Spacing scale ---- */\n  --space-0:   0;\n  --space-1:   0.25rem;  /* 4 */\n  --space-2:   0.5rem;   /* 8 */\n  --space-3:   0.75rem;  /* 12 */\n  --space-4:   1rem;     /* 16 */\n  --space-5:   1.5rem;   /* 24 */\n  --space-6:   2rem;     /* 32 */\n  --space-7:   2.5rem;   /* 40 */\n  --space-8:   3rem;     /* 48 */\n  --space-9:   4rem;     /* 64 */\n  --space-10:  6rem;     /* 96 */\n\n  /* ---- Corner radii (soft, field-guide rounded) ---- */\n  --radius-xs:   4px;\n  --radius-sm:   8px;\n  --radius-md:   12px;\n  --radius-lg:   16px;\n  --radius-xl:   24px;\n  --radius-2xl:  32px;\n  --radius-pill: 999px;\n\n  /* ---- Border widths ---- */\n  --border-thin:  1px;\n  --border-base:  1.5px;\n  --border-thick: 2px;\n\n  /* ---- Layout ---- */\n  --container-sm:  640px;\n  --container-md:  860px;\n  --container-lg:  1100px;\n  --app-width:     420px;   /* mobile app frame */\n  --tap-min:       44px;    /* min touch target */\n\n  /* ---- Motion ---- */\n  --ease-out:   cubic-bezier(0.22, 0.61, 0.36, 1);   /* @kind other */\n  --ease-in-out:cubic-bezier(0.65, 0, 0.35, 1);      /* @kind other */\n  --ease-spring:cubic-bezier(0.34, 1.56, 0.64, 1);   /* @kind other */\n  --dur-fast:   120ms;                                /* @kind other */\n  --dur-base:   200ms;                                /* @kind other */\n  --dur-slow:   320ms;                                /* @kind other */\n}\n\n/* ============================================================\n   SENDERO — ELEVATION & SHADOWS\n   Warm-tinted shadows (sand/earth based, never pure black) so\n   raised surfaces feel sunlit rather than clinical.\n   ============================================================ */\n\n:root {\n  --shadow-xs:  0 1px 2px rgba(43, 39, 30, 0.06);\n  --shadow-sm:  0 1px 3px rgba(43, 39, 30, 0.08), 0 1px 2px rgba(43, 39, 30, 0.06);\n  --shadow-md:  0 4px 10px -2px rgba(43, 39, 30, 0.10), 0 2px 4px -2px rgba(43, 39, 30, 0.06);\n  --shadow-lg:  0 12px 24px -6px rgba(43, 39, 30, 0.14), 0 4px 8px -4px rgba(43, 39, 30, 0.08);\n  --shadow-xl:  0 24px 48px -12px rgba(43, 39, 30, 0.20), 0 8px 16px -8px rgba(43, 39, 30, 0.10);\n\n  /* Inset for sunken fields / map wells */\n  --shadow-inset: inset 0 1px 2px rgba(43, 39, 30, 0.10);\n\n  /* Focus ring as a layered shadow */\n  --ring: 0 0 0 3px var(--focus-ring);\n\n  /* Card lift on hover */\n  --shadow-card:       var(--shadow-sm);\n  --shadow-card-hover: var(--shadow-md);\n\n  /* Floating map controls / FAB */\n  --shadow-float: 0 6px 16px -4px rgba(13, 43, 32, 0.24), 0 2px 6px -2px rgba(13, 43, 32, 0.16);\n}\n\n/* ============================================================\n   SENDERO — BASE / RESET\n   Minimal, opinionated defaults so specimens & kits inherit the\n   brand without per-file boilerplate.\n   ============================================================ */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-sans);\n  font-size: var(--text-base);\n  line-height: var(--leading-normal);\n  color: var(--text-body);\n  background: var(--surface-page);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4, h5 {\n  font-family: var(--font-display);\n  font-weight: var(--weight-bold);\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-tight);\n  color: var(--text-strong);\n  margin: 0;\n  text-wrap: balance;\n}\n\np { text-wrap: pretty; }\n\na { color: var(--text-link); text-decoration: none; }\na:hover { text-decoration: underline; }\n\ncode, kbd, samp { font-family: var(--font-mono); }\n\n/* Shared helpers used across specimens */\n.eyebrow {\n  font-family: var(--font-sans);\n  font-size: var(--text-xs);\n  font-weight: var(--weight-bold);\n  letter-spacing: var(--tracking-eyebrow);\n  text-transform: uppercase;\n  color: var(--text-muted);\n}\n\n.mono-stat {\n  font-family: var(--font-mono);\n  font-variant-numeric: tabular-nums;\n  letter-spacing: var(--tracking-snug);\n}\n\n::selection { background: var(--toronja-200); color: var(--arena-900); }\n\n<\u002Fstyle>\n  <script src=\"c96f19d8-20f4-430a-abf2-f16a5e07b230\"><\u002Fscript>\n  <style>\n    html { scroll-behavior: smooth; }\n    body { margin: 0; background: var(--verde-900); font-family: var(--font-sans); color: var(--text-body); -webkit-font-smoothing: antialiased; }\n    a { color: var(--text-link); text-decoration: none; }\n    a:hover { color: var(--verde-700); }\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh\">\n  <header style=\"position:sticky;top:0;z-index:20;background:rgba(14,43,32,0.82);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,0.08)\">\n    <div style=\"max-width:860px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;gap:24px\">\n      <a href=\"#top\" style=\"display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:700;font-size:0.9375rem;letter-spacing:-0.01em;color:#fff\">\n        <svg width=\"28\" height=\"28\" sc-camel-view-box=\"0 0 32 32\" aria-label=\"Texas, Rio Grande Valley\" style=\"flex:none;filter:drop-shadow(0 2px 3px rgba(0,0,0,0.35))\">\n          < taProfile }}<\u002Fx-import>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <main style=\"max-width:860px;margin:0 auto;padding:64px 28px 96px;display:flex;flex-direction:column;gap:80px\">\n\n    <section id=\"pubs\" style=\"display:flex;flex-direction:column;gap:20px\">\n      <h2 style=\"margin:0;font-family:var(--font-display);font-weight:800;font-size:2rem;letter-spacing:-0.02em;color:#fff\">{{ t.secPubs }}<\u002Fh2>\n      <p style=\"margin:0;font-size:1rem;color:var(--verde-200);max-width:60ch\">{{ t.pubsIntro }}<\u002Fp>\n\n      <a href=\"https://utrgv.primo.exlibrisgroup.com/permalink/01UT_RGV_INST/12haviq/alma991013675218204696\" target=\"_blank\" style=\"display:block\">\n        <div style=\"background:var(--verde-50);border:1px solid var(--verde-100);border-radius:24px;padding:28px 32px;display:flex;flex-direction:column;gap:8px;transition:box-shadow 200ms ease,transform 200ms ease\" style-hover=\"box-shadow:var(--shadow-md);transform:translateY(-2px)\">\n          <span style=\"font-size:0.8125rem;font-weight:600;color:var(--verde-600)\">{{ t.book }}<\u002Fspan>\n          <span style=\"font-family:var(--font-display);font-weight:700;font-size:1.375rem;letter-spacing:-0.01em;line-height:1.25;color:var(--text-strong);text-wrap:balance\">Politics of the Rio Grande Valley: An insider's perspective to regional politics<\u002Fspan>\n          <span style=\"font-size:0.9375rem;color:var(--arena-600)\">{{ t.bookNote }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <div style=\"background:var(--arena-50);border-radius:24px;border:1px solid var(--arena-200);overflow:hidden\">\n        <div style=\"padding:18px 24px 10px;font-size:0.8125rem;font-weight:600;color:var(--text-muted)\">{{ t.moreBooks }}<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:4px;padding:14px 24px;border-top:1px solid var(--arena-100)\">\n          <span style=\"display:flex;flex-wrap:wrap;gap:8px;align-items:center\"><span style=\"font-weight:600;color:var(--text-strong);font-size:0.9688rem\">Political Communication of Hispanic Lawmakers: Identity Politics and Electoral Strategy<\u002Fspan><span style=\"font-size:0.6875rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;background:var(--toronja-100);color:var(--toronja-700);padding:3px 10px;border-radius:999px;flex:none\">{{ t.inContract }}<\u002Fspan><\u002Fspan>\n          <span style=\"font-size:0.8125rem;color:var(--text-muted)\">Bloomsbury Publishing · 2027<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:4px;padding:14px 24px;border-top:1px solid var(--arena-100)\">\n          <span style=\"display:flex;flex-wrap:wrap;gap:8px;align-items:center\"><span style=\"font-weight:600;color:var(--text-strong);font-size:0.9688rem\">Politics of South Texas: An Insider's Perspective from El Paso to San Antonio<\u002Fspan><span style=\"font-size:0.6875rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;background:var(--toronja-100);color:var(--toronja-700);padding:3px 10px;border-radius:999px;flex:none\">{{ t.inContract }}<\u002Fspan><\u002Fspan>\n          <span style=\"font-size:0.8125rem;color:var(--text-muted)\">{{ t.withGagnon }} · Bloomsbury Publishing · 2027<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:var(--arena-50);border-radius:24px;border:1px solid var(--arena-200);overflow:hidden\">\n        <div style=\"padding:18px 24px 10px;font-size:0.8125rem;font-weight:600;color:var(--text-muted)\">{{ t.articles }}<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:4px;padding:14px 24px;border-top:1px solid var(--arena-100)\">\n          <span style=\"display:flex;flex-wrap:wrap;gap:8px;align-items:center\"><span style=\"font-weight:600;color:var(--text-strong);font-size:0.9688rem\">Minority Chairs in Majority Legislatures: What Explains the Power of Minorities in the Texas Legislature<\u002Fspan><span style=\"font-size:0.6875rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;background:var(--resaca-50);color:var(--resaca-500);padding:3px 10px;border-radius:999px;flex:none\">{{ t.submitted }}<\u002Fspan><\u002Fspan>\n          <span style=\"font-size:0.8125rem;color:var(--text-muted)\">{{ t.withGray }} · Legislative Studies Quarterly<\u002Fspan>\n        <\u002Fdiv>\n        <a href=\"https://onlinelibrary.wiley.com/doi/pdf/10.1111/ssqu.13432\" target=\"_blank\" style=\"display:flex;flex-direction:column;gap:2px;padding:14px 24px;border-top:1px solid var(--arena-100);transition:background 120ms ease\" style-hover=\"background:var(--arena-100)\"><span style=\"font-weight:600;color:var(--text-strong);font-size:0.9688rem\">The Twitter blackout: Do congressional rules influence the cyberworld?<\u002Fspan><span style=\"font-size:0.8125rem;color:var(--text-muted)\">Social Science Quarterly<\u002Fspan><\u002Fa>\n        <a href=\"https://onlinelibrary.wiley.com/doi/abs/10.1111/ssqu.13080\" target=\"_blank\" style=\"display:flex;flex-direction:column;gap:2px;padding:14px 24px;border-top:1px solid var(--arena-100);transition:background 120ms ease\" style-hover=\"background:var(--arena-100)\"><span style=\"font-weight:600;color:var(--text-strong);font-size:0.9688rem\">Twitter and the electoral connection<\u002Fspan><span style=\"font-size:0.8125rem;color:var(--text-muted)\">Social Science Quarterly<\u002Fspan><\u002Fa>\n        <a href=\"https://gutierrezmannix.github.io/images/Numero39.pdf\" target=\"_blank\" style=\"display:flex;flex-direction:column;gap:2px;padding:14px 24px;border-top:1px solid var(--arena-100);transition:background 120ms ease\" style-hover=\"background:var(--arena-100)\"><span style=\"font-weight:600;color:var(--text-strong);font-size:0.9688rem\">La metadata y su regulación legal<\u002Fspan><span style=\"font-size:0.8125rem;color:var(--text-muted)\">PDF<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n\n      <div style=\"background:var(--arena-50);border-radius:2 );transition:background 120ms ease\" style-hover=\"background:var(--arena-100)\"><span style=\"font-weight:600;color:var(--text-strong);font-size:0.9688rem\">Militarization, geopolitics &amp; energy sovereignty<\u002Fspan><span style=\"font-size:0.8125rem;color:var(--text-muted)\">Contrahistoria del pueblo mexicano · Penguin Debate<\u002Fspan><\u002Fa>\n        <a href=\"https://scholarworks.utrgv.edu/pol_fac/207/\" target=\"_blank\" style=\"display:flex;flex-direction:column;gap:2px;padding:14px 24px;border-top:1px solid var(--arena-100);transition:background 120ms ease\" style-hover=\"background:var(--arena-100)\"><span style=\"font-weight:600;color:var(--text-strong);font-size:0.9688rem\">Criminal justice system of Mexico<\u002Fspan><span style=\"font-size:0.8125rem;color:var(--text-muted)\">Comparative Criminal Justice · Rowman &amp; Littlefield<\u002Fspan><\u002Fa>\n        <a href=\"https://uofrpress.ca/Books/O/Organized-Violence\" target=\"_blank\" style=\"display:flex;flex-direction:column;gap:2px;padding:14px 24px;border-top:1px solid var(--arena-100);transition:background 120ms ease\" style-hover=\"background:var(--arena-100)\"><span style=\"font-weight:600;color:var(--text-strong);font-size:0.9688rem\">Tamaulipas<\u002Fspan><span style=\"font-size:0.8125rem;color:var(--text-muted)\">Organized Violence · University of Regina Press<\u002Fspan><\u002Fa>\n        <a href=\"https://scholarworks.utrgv.edu/regionalhist/15/\" target=\"_blank\" style=\"display:flex;flex-direction:column;gap:2px;padding:14px 24px;border-top:1px solid var(--arena-100);transition:background 120ms ease\" style-hover=\"background:var(--arena-100)\"><span style=\"font-weight:600;color:var(--text-strong);font-size:0.9688rem\">Spanish-speaking institutions and language assimilation<\u002Fspan><span style=\"font-size:0.8125rem;color:var(--text-muted)\">Studies in Rio Grande Valley History<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1
